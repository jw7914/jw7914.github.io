<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jason Wu | Portfolio</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <!-- Boxicons CSS -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="icon" href="./assets/logo2.png" />
</head>
<body>
    <!-- Navbar Contents -->
    <header class="header">
        <div class="logo">
            <a href="#top" class="logo-text">Jason Wu</a>
            <!---
            <a href="#top">
                <img src="./assets/logo_transparent.png" class="logo-img" />
            </a>
            -->
        </div>
        <nav class="navbar">
            <a href="#aboutme">About Me</a>
            <a href="#skills">Skills</a>
            <a href="#projects">Projects</a>
        </nav>
    </header>

    <!-- Profile Section -->
    <section id="profile">
        <div class="profile-text">
            <h3 class="profile-text-h3">Hello,</h3>
            <h1 class="profile-text-h1"> I'm Jason</h1>
            <p class="profile-text-p">A student at New York University's Tandon School of Engineering 
                pursuing a Bachelor of Science in Computer Science with a minor in Cybersecurity.
            </p>
            <div class="btn-container">
                <button class="btn-resume" onclick="window.open('./assets/Jason_Wu_Resume.pdf')">Resume</button>
                <button class="btn-contact" onclick="location.href='./#contact'">Contact Me</button>
            </div>
            <div id="socials-container">
                <img src="./assets/linkedin.png" alt="My Linkedin Page" class="icons" id="linkedin"
                onclick="location.href='https://www.linkedin.com/in/jason-wu-3656b2241/'"/>
                <img src="./assets/github.png" alt="My GitHub Page" class="icons" id="github"
                onclick="location.href='https://github.com/jw7914'"/>
            </div>
        </div>
        <div class="profile-person-img">
            <img src="./assets/1696481973145.jpeg" alt="Jason Profile Picture">
        </div>
    </section>
    <!-- Contact Me Section-->
    <section class="contact-form" id="contact">
        <h2 class="contact-me">Contact Me</h2>
        <form action="https://api.web3forms.com/submit" method="POST" method="get">
            <input type="hidden" name="access_key" value="0d4fd43f-3183-407a-9e0e-838aeb96e92f">
            <div class="input-box">
                <input type="text" name="name" placeholder="Full Name" required/>
                <input type="email" name="email" placeholder="Email" required />
            </div>
            <div class="input-box">
                <input type="phone number" name="number" placeholder="Phone Number (optional)" />
                <input type="text" name="subject" placeholder="Subject" />
            </div>
            <textarea name="message" placeholder="Your Message"></textarea>
            <input type="submit" value="Send Message" class="btn-contact">
        </form>
    </section>

    <footer class="footer">
        
    </footer>
   
    <script src="./js/scripts.js"></script>
</body>
</html>
