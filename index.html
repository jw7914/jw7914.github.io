<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jason Wu | Portfolio</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <!-- Boxicons CSS -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' />
    <link rel="icon" href="./assets/logo2.png" />
</head>
<body>
    <!-- Navbar Contents -->
    <header class="header">
        <div class="logo">
            <a href="#top" class="logo-text">Jason Wu</a>
            <!---
            <a href="#top">
                <img src="./assets/logo_transparent.png" class="logo-img" />
            </a>
            -->
        </div>
        <nav class="navbar">
            <a href="#aboutme">About Me</a>
            <a href="#skills">Skills</a>
            <a href="#projects">Projects</a>
        </nav>
    </header>

    <!-- About Me Section -->
    <section id="aboutme">
        <div class="aboutme-text">
            <h3 class="aboutme-text-h3">Hello,</h3>
            <h1 class="aboutme-text-h1"> I'm Jason</h1>
            <p class="aboutme-text-p">Student at New York University's Tandon School of Engineering 
                pursuing a Bachelor of Science in Computer Science with a minor in Cybersecurity.
            </p>
            <div class="btn-container">
                <button class="btn-resume" onclick="window.open('./assets/Jason_Wu_Resume.pdf')">Resume</button>
                <button class="btn-contact" onclick="location.href='./#contact'">Contact Me</button>
            </div>
            <div id="socials-container">
                <img src="./assets/linkedin.png" alt="My Linkedin Page" class="icons" 
                onclick="location.href='https://www.linkedin.com/in/jason-wu-3656b2241/'"/>
                <img src="./assets/github.png" alt="My GitHub Page" class="icons" 
                onclick="location.href='https://github.com/jw7914'"/>
            </div>
        </div>
        <div class="aboutme-person-img">
            <img src="./assets/2.png" alt="Jason Profile Picture">
        </div>
    </section>
   
    <script src="./js/scripts.js"></script>
